name: moodwave
description: MoodWave — Music App for mood-based listening
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  dio: ^5.4.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  just_audio: ^0.9.36
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  http: ^1.2.0
  url_launcher: ^6.2.4
  youtube_player_iframe: ^5.1.3
  image_picker: ^1.1.2
  fl_chart: ^0.68.0
  share_plus: ^9.0.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
