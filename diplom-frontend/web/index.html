<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="moodwave">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>moodwave</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDoetN0rxAbriHE8B4N_W7Mra_caZE5iPY",
      authDomain: "moodwave-a4adb-98e29.firebaseapp.com",
      projectId: "moodwave-a4adb-98e29",
      storageBucket: "moodwave-a4adb-98e29.firebasestorage.app",
      messagingSenderId: "13338581238",
      appId: "1:13338581238:web:6a0a4178e76cdceaf1f4d7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    window.firebaseAuth = auth;
  </script>

  <!-- Spotify Web Playback SDK -->
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script>
    // Called automatically by the Spotify SDK when it's ready
    window.onSpotifyWebPlaybackSDKReady = function () {
      window.spotifySDKLoaded = true;
      console.log('[Spotify] SDK ready');
      // If init was called before SDK loaded, run it now
      if (window._pendingSpotifyToken) {
        window.spotifyBridge.init(window._pendingSpotifyToken);
        window._pendingSpotifyToken = null;
      }
    };

    window.spotifyBridge = {
      player: null,
      deviceId: null,
      ready: false,
      lastState: null,
      _currentToken: null,

      init: function (token) {
        // If SDK not yet loaded, queue the init
        if (!window.spotifySDKLoaded) {
          window._pendingSpotifyToken = token;
          return;
        }
        // Disconnect previous player if any
        if (window.spotifyBridge.player) {
          window.spotifyBridge.player.disconnect();
          window.spotifyBridge.player = null;
          window.spotifyBridge.deviceId = null;
          window.spotifyBridge.ready = false;
        }

        window.spotifyBridge._currentToken = token;

        var player = new Spotify.Player({
          name: 'MoodWave',
          getOAuthToken: function (cb) { cb(token); },
          volume: 0.8
        });

        player.addListener('ready', function (data) {
          window.spotifyBridge.deviceId = data.device_id;
          window.spotifyBridge.ready = true;
          console.log('[Spotify] Ready, device:', data.device_id);
        });

        player.addListener('not_ready', function () {
          window.spotifyBridge.ready = false;
        });

        player.addListener('player_state_changed', function (state) {
          window.spotifyBridge.lastState = state;
        });

        player.addListener('initialization_error', function (e) {
          console.error('[Spotify] Init error:', e.message);
        });
        player.addListener('authentication_error', function (e) {
          console.error('[Spotify] Auth error:', e.message);
          window.spotifyBridge.ready = false;
        });
        player.addListener('account_error', function (e) {
          console.error('[Spotify] Account error (Premium required):', e.message);
        });

        player.connect();
        window.spotifyBridge.player = player;
      },

      // Search Spotify for the best match and play it
      playByQuery: async function (query, token) {
        var deviceId = window.spotifyBridge.deviceId;
        if (!deviceId) { console.warn('[Spotify] No device ID yet'); return false; }

        try {
          var searchResp = await fetch(
            'https://api.spotify.com/v1/search?q=' + encodeURIComponent(query) + '&type=track&limit=1',
            { headers: { 'Authorization': 'Bearer ' + token } }
          );
          var searchData = await searchResp.json();
          var items = searchData && searchData.tracks && searchData.tracks.items;
          if (!items || items.length === 0) { console.warn('[Spotify] No results for:', query); return false; }
          var uri = items[0].uri;

          await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + deviceId, {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ uris: [uri] })
          });
          return true;
        } catch (e) {
          console.error('[Spotify] playByQuery error:', e);
          return false;
        }
      },

      // Play a track by its Spotify URI directly
      playUri: async function (uri, token) {
        var deviceId = window.spotifyBridge.deviceId;
        if (!deviceId) return false;
        try {
          await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + deviceId, {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ uris: [uri] })
          });
          return true;
        } catch (e) {
          return false;
        }
      },

      pause: function () {
        if (window.spotifyBridge.player) window.spotifyBridge.player.pause();
      },

      resume: function () {
        if (window.spotifyBridge.player) window.spotifyBridge.player.resume();
      },

      seek: function (posMs) {
        if (window.spotifyBridge.player) window.spotifyBridge.player.seek(posMs);
      },

      setVolume: function (vol) {
        if (window.spotifyBridge.player) window.spotifyBridge.player.setVolume(vol);
      },

      nextTrack: function () {
        if (window.spotifyBridge.player) window.spotifyBridge.player.nextTrack();
      },

      previousTrack: function () {
        if (window.spotifyBridge.player) window.spotifyBridge.player.previousTrack();
      },

      // Returns a plain-object snapshot of current state (synchronous)
      getState: function () {
        var s = window.spotifyBridge.lastState;
        if (!s) return null;
        return {
          paused: s.paused,
          position: s.position,
          duration: s.duration
        };
      }
    };
  </script>
</body>
</html>
